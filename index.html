<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#020510"/>
<title>Playful — Turn Words Into Worlds</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Instrument+Serif:ital@1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js" crossorigin="anonymous"></script>

<style>
/* ════════════════════════════════════════
   RESET + CSS TOKENS
════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:auto;-webkit-tap-highlight-color:transparent;}

:root{
  --nb:#00b4ff;
  --nc:#00eaff;
  --nd:#0044ff;
  --bg:#020510;
  /* layout */
  --nav-h:60px;
  --pb-w:min(90vw,460px);     /* prompt box width  */
  --holo-w:min(88vw,580px);   /* hologram width    */
}

body{
  background:var(--bg);
  font-family:'Space Mono',monospace;
  color:#fff;
  height:550vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* grain overlay — lighter on mobile to save GPU */
body::after{
  content:'';position:fixed;inset:0;z-index:900;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.02;mix-blend-mode:overlay;
}

/* vignette */
.vignette{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 90% 85% at 50% 50%,transparent 30%,rgba(0,0,18,.72) 100%);
}

#webgl-canvas{
  position:fixed;inset:0;width:100vw;height:100vh;
  z-index:1;display:block;outline:none;touch-action:none;
}
#ui-layer{position:fixed;inset:0;z-index:10;pointer-events:none;}

/* ════════════════════════════════════════
   LOADING SCREEN — PS5 spinner
════════════════════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:8000;
  background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(0,16,48,.94) 0%,var(--bg) 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .9s ease;
}
#loader.out{opacity:0;pointer-events:none;}

/* ── spinner ring ── */
.l-ring-wrap{
  position:relative;
  width:clamp(120px,22vw,158px);
  height:clamp(120px,22vw,158px);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:clamp(18px,4vh,30px);
}

.l-ring{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid transparent;
  background:
    linear-gradient(var(--bg),var(--bg)) padding-box,
    conic-gradient(from 0deg,transparent 0%,var(--nc) 35%,var(--nb) 60%,transparent 100%) border-box;
  animation:spinR 1.35s linear infinite;
}
.l-ring2{
  position:absolute;inset:12px;border-radius:50%;
  border:1.5px solid transparent;
  background:
    linear-gradient(var(--bg),var(--bg)) padding-box,
    conic-gradient(from 180deg,transparent,rgba(0,160,255,.45) 40%,transparent) border-box;
  animation:spinR 2.1s linear infinite reverse;
}
@keyframes spinR{to{transform:rotate(360deg);}}

.l-dots{position:absolute;inset:-5px;border-radius:50%;animation:spinR 2.8s linear infinite;}
.l-dot{
  position:absolute;top:0;left:50%;
  transform:translateX(-50%);
  width:clamp(5px,1.2vw,7px);height:clamp(5px,1.2vw,7px);
  border-radius:50%;background:var(--nc);
  box-shadow:0 0 10px var(--nc),0 0 22px var(--nb);
  animation:dotP 1.35s ease-in-out infinite;
}
.l-dot:nth-child(2){transform:translateX(-50%) rotate(90deg);transform-origin:50% calc(clamp(60px,11vw,79px));animation-delay:.34s;opacity:.65;}
.l-dot:nth-child(3){transform:translateX(-50%) rotate(180deg);transform-origin:50% calc(clamp(60px,11vw,79px));animation-delay:.68s;opacity:.38;}
.l-dot:nth-child(4){transform:translateX(-50%) rotate(270deg);transform-origin:50% calc(clamp(60px,11vw,79px));animation-delay:1.02s;opacity:.65;}
@keyframes dotP{
  0%,100%{box-shadow:0 0 8px var(--nc),0 0 18px var(--nb);}
  50%{box-shadow:0 0 18px var(--nc),0 0 40px var(--nb),0 0 60px rgba(0,100,255,.4);}
}

/* PS5 controller SVG */
.l-ctrl{
  width:clamp(48px,10vw,68px);height:auto;
  position:relative;z-index:2;
  filter:drop-shadow(0 0 7px var(--nc)) drop-shadow(0 0 16px var(--nb));
  animation:ctrlF 2.8s ease-in-out infinite;
}
@keyframes ctrlF{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-4px) scale(1.04);}}

.l-logo{
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(1.6rem,7vw,3rem);letter-spacing:.22em;
  background:linear-gradient(90deg,#fff 0%,var(--nc) 40%,var(--nb) 70%,#fff 100%);
  background-size:300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:lShift 3s linear infinite;margin-bottom:6px;
}
@keyframes lShift{0%{background-position:0%;}100%{background-position:300%;}}
.l-tag{
  font-family:'Space Mono',monospace;
  font-size:clamp(.48rem,.9vw,.6rem);
  letter-spacing:.32em;color:rgba(0,180,255,.46);
  text-transform:uppercase;margin-bottom:clamp(14px,3vh,20px);
}
.l-bar-track{width:clamp(160px,40vw,220px);height:1.5px;background:rgba(0,100,255,.12);border-radius:2px;overflow:hidden;}
.l-bar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--nd),var(--nc));
  box-shadow:0 0 8px var(--nc);
  animation:barF 2s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes barF{0%{width:0%;}20%{width:18%;}55%{width:62%;}100%{width:100%;}}
.l-status{
  font-family:'Space Mono',monospace;
  font-size:clamp(.44rem,.8vw,.52rem);
  letter-spacing:.2em;color:rgba(0,180,255,.42);
  margin-top:9px;animation:blink 1.1s step-end infinite;
}
@keyframes blink{50%{opacity:0;}}

/* ════════════════════════════════════════
   NAV  — full responsive
════════════════════════════════════════ */
.top-nav{
  position:absolute;top:0;left:0;right:0;
  height:var(--nav-h);
  padding:0 clamp(14px,4vw,48px);
  display:flex;justify-content:space-between;align-items:center;
  pointer-events:auto;
  background:linear-gradient(to bottom,rgba(0,0,20,.72) 0%,transparent 100%);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}

.nav-brand{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-icon-svg{
  width:clamp(22px,3.5vw,32px);
  height:auto;flex-shrink:0;
}
.nav-name{
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(.78rem,2vw,1.2rem);letter-spacing:.2em;
  background:linear-gradient(90deg,#fff 0%,#a855f7 22%,#38bdf8 44%,#fb923c 66%,#fff 100%);
  background-size:280%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:navG 4s linear infinite;
}
@keyframes navG{0%{background-position:0%;}100%{background-position:280%;}}

.nav-right{display:flex;gap:7px;align-items:center;}

/* pricing — hidden on tiny screens */
.nav-pricing{
  padding:6px 14px;border-radius:99px;
  border:1px solid rgba(168,85,247,.28);background:rgba(168,85,247,.07);
  color:rgba(196,181,253,.85);
  font-family:'Space Mono',monospace;font-size:clamp(.58rem,.9vw,.7rem);
  font-weight:700;letter-spacing:.06em;cursor:pointer;
  text-decoration:none;display:inline-block;
  transition:all .24s;
}
.nav-pricing:hover{background:rgba(168,85,247,.18);color:#fff;}
@media(max-width:400px){.nav-pricing{display:none;}}

/* auth — hidden until animation ends */
.nav-auth{
  display:flex;gap:7px;
  opacity:0;transform:translateY(-8px);
  transition:opacity .6s,transform .6s;
  pointer-events:none;
}
.nav-auth.show{opacity:1;transform:translateY(0);pointer-events:all;}

.nbtn{
  padding:clamp(5px,1vw,8px) clamp(12px,2vw,20px);
  border-radius:99px;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:rgba(255,255,255,.72);
  font-family:'Space Mono',monospace;font-size:clamp(.6rem,.9vw,.7rem);
  font-weight:700;letter-spacing:.06em;
  cursor:pointer;transition:all .26s;
  text-decoration:none;display:inline-block;
  white-space:nowrap;
}
.nbtn:hover{background:rgba(255,255,255,.1);color:#fff;}
.nbtn.signin{border-color:rgba(0,180,255,.28);background:rgba(0,100,255,.07);color:rgba(0,210,255,.88);}
.nbtn.signin:hover{background:rgba(0,100,255,.18);color:#fff;}
.nbtn.signup{
  background:linear-gradient(135deg,rgba(0,70,200,.55),rgba(0,150,255,.38));
  border-color:rgba(0,170,255,.48);color:#7dd6ff;
  box-shadow:0 0 14px rgba(0,110,255,.2);
}
.nbtn.signup:hover{background:linear-gradient(135deg,rgba(0,70,200,.72),rgba(0,150,255,.55));color:#fff;}

/* ════════════════════════════════════════
   PROMPT BOX
════════════════════════════════════════ */
#prompt-box{
  position:absolute;
  top:calc(var(--nav-h) + clamp(10px,3vh,28px));
  left:50%;
  transform:translateX(-50%);
  width:var(--pb-w);
  opacity:0;
  border-radius:16px;
  padding:1.5px;
  background:linear-gradient(135deg,#00aaff,#0033ff,#00eeff,#0066ff);
  background-size:280%;
  animation:pbBorder 3s ease infinite;
  box-shadow:
    0 0 clamp(20px,4vw,40px) rgba(0,140,255,.4),
    0 0 clamp(40px,8vw,80px) rgba(0,80,255,.2),
    0 0 clamp(60px,12vw,130px) rgba(0,60,200,.1);
  will-change:opacity;
}
@keyframes pbBorder{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}

.pb-inner{
  border-radius:15px;
  padding:clamp(14px,3vw,22px) clamp(16px,3.5vw,26px);
  background:rgba(0,5,22,.9);
  backdrop-filter:blur(32px) saturate(1.8);
  -webkit-backdrop-filter:blur(32px) saturate(1.8);
  box-shadow:
    0 0 0 1px rgba(0,160,255,.07) inset,
    0 2px 0 rgba(0,200,255,.04) inset,
    0 20px 55px rgba(0,0,0,.82);
  position:relative;overflow:hidden;
}
.pb-inner::before{
  content:'';position:absolute;inset:0;z-index:0;border-radius:inherit;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 55% at 50% -5%,rgba(0,100,255,.14),transparent 65%),
    radial-gradient(ellipse 55% 40% at 50% 108%,rgba(0,60,200,.1),transparent 65%);
}
.pb-inner::after{
  content:'';position:absolute;inset:0;z-index:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(108deg,transparent 32%,rgba(0,200,255,.024) 50%,transparent 68%);
  background-size:200%;animation:pbShim 4.5s ease-in-out infinite;
}
@keyframes pbShim{0%{background-position:200% 0;}60%{background-position:-200% 0;}100%{background-position:200% 0;}}

#typewriter{
  font-family:'Space Mono',monospace;
  font-size:clamp(.68rem,1.8vw,.88rem);
  font-weight:400;line-height:1.8;
  color:rgba(185,225,255,.92);letter-spacing:.01em;
  display:block;position:relative;z-index:1;
  min-height:1.5em;
}
.tc{
  display:inline-block;width:2px;height:1.05em;
  background:linear-gradient(to bottom,var(--nc),var(--nd));
  margin-left:2px;vertical-align:text-bottom;border-radius:1px;
  box-shadow:0 0 7px var(--nc);
  animation:blink 1.1s step-end infinite;
  position:relative;z-index:1;
}

/* ════════════════════════════════════════
   HOLOGRAM SCREEN  — Iron Man / image style
════════════════════════════════════════ */

/* ── outer wrapper — provides the thick glowing border + depth ── */
#holo-wrap{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-60%) scale(0.06);
  width:var(--holo-w);
  opacity:0;
  /* iron man style: multiple glow shells */
  filter:
    drop-shadow(0 0 clamp(12px,3vw,28px) rgba(0,200,255,.95))
    drop-shadow(0 0 clamp(28px,6vw,60px) rgba(0,140,255,.7))
    drop-shadow(0 0 clamp(55px,11vw,120px) rgba(0,80,200,.45))
    drop-shadow(0 0 clamp(90px,18vw,200px) rgba(0,50,160,.25));
  z-index:20;
  pointer-events:none;
  will-change:transform,opacity;
}

/* Border frame — thick rounded neon border matching the image */
.holo-frame{
  position:relative;
  border-radius:clamp(16px,2.5vw,28px);
  padding:clamp(3px,0.5vw,5px);   /* border thickness */
  background:linear-gradient(
    135deg,
    #00ffff 0%,
    #0088ff 25%,
    #00eeff 50%,
    #0044ff 75%,
    #00ccff 100%
  );
  background-size:300% 300%;
  animation:framePulse 3s ease infinite;
  box-shadow:
    /* outer glow layers — matching image */
    0 0 clamp(8px,2vw,20px)  rgba(0,220,255,1),
    0 0 clamp(20px,4vw,45px) rgba(0,160,255,.85),
    0 0 clamp(40px,8vw,90px) rgba(0,100,220,.6),
    0 0 clamp(70px,14vw,160px) rgba(0,60,180,.35),
    /* inset highlight on border */
    inset 0 1px 0 rgba(255,255,255,.55),
    inset 0 -1px 0 rgba(0,180,255,.4);
}
@keyframes framePulse{
  0%,100%{background-position:0% 50%;box-shadow:0 0 clamp(8px,2vw,20px) rgba(0,220,255,1),0 0 clamp(20px,4vw,45px) rgba(0,160,255,.85),0 0 clamp(40px,8vw,90px) rgba(0,100,220,.6),0 0 clamp(70px,14vw,160px) rgba(0,60,180,.35),inset 0 1px 0 rgba(255,255,255,.55);}
  50%{background-position:100% 50%;box-shadow:0 0 clamp(14px,3vw,30px) rgba(0,240,255,1),0 0 clamp(30px,6vw,65px) rgba(0,180,255,.9),0 0 clamp(60px,12vw,130px) rgba(0,120,240,.65),0 0 clamp(100px,20vw,220px) rgba(0,80,200,.4),inset 0 1px 0 rgba(255,255,255,.65);}
}

/* Inner screen container */
#holo-screen{
  position:relative;
  border-radius:clamp(12px,2vw,22px);
  overflow:hidden;
  aspect-ratio:16/9;
  background:#000308;
}

/* Corner accent marks — larger, more cinematic */
.hc{
  position:absolute;
  width:clamp(18px,3vw,30px);
  height:clamp(18px,3vw,30px);
  z-index:8;pointer-events:none;
  border-color:rgba(255,255,255,.95);
  border-style:solid;
}
.hc.tl{top:-1px;left:-1px;border-width:3px 0 0 3px;border-radius:clamp(10px,2vw,18px) 0 0 0;}
.hc.tr{top:-1px;right:-1px;border-width:3px 3px 0 0;border-radius:0 clamp(10px,2vw,18px) 0 0;}
.hc.bl{bottom:-1px;left:-1px;border-width:0 0 3px 3px;border-radius:0 0 0 clamp(10px,2vw,18px);}
.hc.br{bottom:-1px;right:-1px;border-width:0 3px 3px 0;border-radius:0 0 clamp(10px,2vw,18px) 0;}

/* Iron Man HUD overlay — top bar */
.h-hud-top{
  position:absolute;top:0;left:0;right:0;
  height:clamp(22px,4vh,36px);
  z-index:6;pointer-events:none;
  background:linear-gradient(to bottom,rgba(0,8,30,.88) 0%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(10px,2vw,18px);
}
.h-hud-left,.h-hud-right{
  display:flex;align-items:center;gap:clamp(6px,1vw,12px);
}
.h-hud-badge{
  font-family:'Space Mono',monospace;
  font-size:clamp(.34rem,.5vw,.44rem);
  letter-spacing:.22em;color:rgba(0,220,255,.8);
  text-transform:uppercase;
  background:rgba(0,120,255,.12);
  border:1px solid rgba(0,200,255,.28);
  padding:2px 7px;border-radius:3px;
}
.h-hud-dot{
  width:5px;height:5px;border-radius:50%;
  background:#4ade80;
  box-shadow:0 0 6px #4ade80,0 0 12px rgba(74,222,128,.4);
  animation:blink 1.4s step-end infinite;
}
.h-hud-title{
  font-family:'Space Mono',monospace;
  font-size:clamp(.32rem,.48vw,.42rem);
  letter-spacing:.28em;
  color:rgba(0,210,255,.65);text-transform:uppercase;
}

/* Iron Man HUD overlay — bottom bar */
.h-hud-bot{
  position:absolute;bottom:0;left:0;right:0;
  height:clamp(20px,3.5vh,32px);
  z-index:6;pointer-events:none;
  background:linear-gradient(to top,rgba(0,8,30,.85) 0%,transparent 100%);
  display:flex;align-items:center;justify-content:center;
}
.h-hud-bot-txt{
  font-family:'Space Mono',monospace;
  font-size:clamp(.3rem,.45vw,.4rem);
  letter-spacing:.28em;color:rgba(0,180,255,.5);text-transform:uppercase;
}

/* Left & right side data strips */
.h-side{
  position:absolute;top:0;bottom:0;
  width:clamp(36px,5vw,58px);
  z-index:5;pointer-events:none;
}
.h-side.left{left:0;background:linear-gradient(to right,rgba(0,5,25,.72),transparent);}
.h-side.right{right:0;background:linear-gradient(to left,rgba(0,5,25,.72),transparent);}
.h-side-bar{
  position:absolute;
  left:clamp(4px,1vw,8px);right:clamp(4px,1vw,8px);
  height:clamp(2px,.4vw,3px);
  background:rgba(0,200,255,.45);border-radius:2px;
}
.h-side.right .h-side-bar{background:rgba(0,200,255,.45);}

/* Scanning sweep line */
.h-sweep{
  position:absolute;top:-3px;left:0;right:0;
  height:clamp(2px,.35vw,3px);z-index:7;opacity:0;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(0,180,255,.1) 10%,
    rgba(0,220,255,.9) 50%,
    rgba(0,180,255,.1) 90%,
    transparent 100%
  );
  box-shadow:
    0 0 clamp(6px,1.5vw,14px) rgba(0,220,255,.7),
    0 0 clamp(12px,3vw,28px) rgba(0,160,255,.4);
  animation:hSweep 2.4s linear infinite;
}
@keyframes hSweep{0%{top:-3px;}100%{top:100%;}}

/* Scanlines */
.h-scanlines{
  position:absolute;inset:0;z-index:4;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 3px,
    rgba(0,5,20,.05) 3px,rgba(0,5,20,.05) 4px
  );
}

/* Vignette inside screen — darker edges like the image */
.h-vignette{
  position:absolute;inset:0;z-index:3;pointer-events:none;
  background:radial-gradient(ellipse 90% 85% at 50% 50%,transparent 45%,rgba(0,0,30,.65) 100%);
}

/* Video fills the screen */
#game-vid{
  width:100%;height:100%;
  object-fit:cover;display:block;
  position:relative;z-index:1;
}

/* ── Floor reflection glow (below hologram, like the image) ── */
#holo-floor{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,8%) scale(0.06);
  width:var(--holo-w);
  height:clamp(20px,4vh,50px);
  opacity:0;
  background:radial-gradient(ellipse 80% 100% at 50% 0%,
    rgba(0,200,255,.35) 0%,
    rgba(0,100,200,.12) 45%,
    transparent 70%
  );
  filter:blur(clamp(4px,1vw,10px));
  z-index:19;pointer-events:none;
  will-change:transform,opacity;
}

/* ── Projector beam (CSS version for extra glow below screen) ── */
#holo-beam-css{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.06);
  width:clamp(2px,0.5vw,4px);
  height:clamp(80px,20vh,200px);
  margin-top:clamp(10px,3vh,30px);
  opacity:0;
  background:linear-gradient(to bottom,
    rgba(0,220,255,.9) 0%,
    rgba(0,160,255,.5) 40%,
    rgba(0,80,200,.15) 75%,
    transparent 100%
  );
  box-shadow:
    0 0 clamp(4px,1vw,10px) rgba(0,220,255,.8),
    0 0 clamp(10px,2.5vw,24px) rgba(0,160,255,.5);
  border-radius:2px;
  z-index:18;pointer-events:none;
  will-change:opacity;
}

/* ════════════════════════════════════════
   SCROLL HINT
════════════════════════════════════════ */
#scroll-hint{
  position:absolute;bottom:clamp(16px,4vh,26px);left:50%;
  transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  animation:shFloat 2.2s ease-in-out infinite;
}
.sh-mouse{width:20px;height:32px;border:1.5px solid rgba(0,180,255,.32);border-radius:10px;display:flex;justify-content:center;padding-top:5px;}
.sh-dot{width:3px;height:5px;border-radius:2px;background:rgba(0,180,255,.7);animation:shDot 2.2s ease-in-out infinite;}
@keyframes shDot{0%,100%{transform:translateY(0);opacity:1;}60%{transform:translateY(7px);opacity:0;}80%{opacity:1;}}
.sh-txt{font-family:'Space Mono',monospace;font-size:clamp(.38rem,.6vw,.48rem);letter-spacing:.32em;color:rgba(0,180,255,.32);text-transform:uppercase;}
@keyframes shFloat{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(6px);}}

/* phase label */
#phase-lbl{position:absolute;bottom:18px;right:16px;font-family:'Space Mono',monospace;font-size:.4rem;letter-spacing:.2em;color:rgba(0,160,255,.14);pointer-events:none;}

/* ════════════════════════════════════════
   HERO UI  — responsive bottom panel
════════════════════════════════════════ */
#bottom-ui{
  position:absolute;
  bottom:clamp(14px,5vh,50px);
  left:0;right:0;
  text-align:center;opacity:0;transform:translateY(32px);
  pointer-events:auto;
  padding:0 clamp(12px,4vw,24px);
}

.hero-logo{
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(2.2rem,8vw,5.5rem);
  letter-spacing:.07em;line-height:1;margin-bottom:6px;
  background:linear-gradient(90deg,#fff 0%,#a855f7 18%,#38bdf8 36%,#fb923c 54%,#ec4899 72%,#a855f7 88%,#fff 100%);
  background-size:260%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:logoG 5s linear infinite;
  filter:drop-shadow(0 0 28px rgba(0,180,255,.18));
}
@keyframes logoG{0%{background-position:0%;}100%{background-position:260%;}}

.hero-tagline{
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:clamp(.9rem,3.5vw,2rem);
  color:rgba(200,220,255,.56);letter-spacing:.01em;
  margin-bottom:clamp(14px,2.5vh,24px);
}

/* capsule chips */
.hero-caps{
  display:flex;gap:clamp(6px,1.5vw,10px);
  justify-content:center;flex-wrap:wrap;
  margin-bottom:clamp(14px,2.5vh,22px);
}
.cap{
  padding:clamp(8px,1.5vw,11px) clamp(18px,3.5vw,34px);
  border-radius:99px;border:none;cursor:pointer;
  font-family:'Orbitron',sans-serif;font-weight:700;
  font-size:clamp(.6rem,1.5vw,.78rem);
  letter-spacing:.15em;text-transform:uppercase;color:#fff;
  position:relative;overflow:hidden;
  transition:transform .3s,box-shadow .3s;
  -webkit-tap-highlight-color:transparent;
}
.cap::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transform:translateX(-100%);transition:transform .5s;}
.cap:active::after,.cap:hover::after{transform:translateX(100%);}
.cap:active,.cap:hover{transform:translateY(-3px) scale(1.05);}

.cap-b{background:linear-gradient(135deg,#0ea5e9,#2563eb,#4f46e5);box-shadow:0 0 20px rgba(14,165,233,.38),inset 0 1px 0 rgba(255,255,255,.14);}
.cap-p{background:linear-gradient(135deg,#10b981,#06b6d4,#0ea5e9);box-shadow:0 0 20px rgba(16,185,129,.38),inset 0 1px 0 rgba(255,255,255,.14);}
.cap-pb{background:linear-gradient(135deg,#f97316,#ec4899,#a855f7);box-shadow:0 0 20px rgba(249,115,22,.38),inset 0 1px 0 rgba(255,255,255,.14);}

/* CTA button */
.build-btn{
  position:relative;overflow:hidden;
  display:inline-flex;align-items:center;gap:9px;
  padding:clamp(12px,2vw,16px) clamp(32px,7vw,60px);
  border-radius:99px;border:none;cursor:pointer;
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(.72rem,2vw,.92rem);letter-spacing:.2em;text-transform:uppercase;color:#fff;
  background:linear-gradient(135deg,#1a1572,#4f46e5,#a855f7,#ec4899,#f97316);
  background-size:300%;animation:btnG 4s ease infinite;
  box-shadow:
    0 0 clamp(20px,5vw,55px) rgba(79,70,229,.5),
    0 0 clamp(40px,10vw,110px) rgba(168,85,247,.18),
    0 10px 30px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.13);
  transition:transform .3s,box-shadow .3s;text-decoration:none;
  -webkit-tap-highlight-color:transparent;
}
.build-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transform:translateX(-100%);transition:transform .6s;}
.build-btn:active::after,.build-btn:hover::after{transform:translateX(100%);}
.build-btn:active,.build-btn:hover{transform:translateY(-4px) scale(1.05);box-shadow:0 0 clamp(40px,8vw,85px) rgba(79,70,229,.68),0 16px 42px rgba(0,0,0,.6);}
@keyframes btnG{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}

/* ════════════════════════════════════════
   MOBILE-SPECIFIC TWEAKS
════════════════════════════════════════ */
@media(max-width:480px){
  /* stack hero text tighter */
  #bottom-ui{bottom:10px;}
  .hero-caps{gap:6px;}
  .cap{padding:8px 16px;letter-spacing:.1em;}
  /* prompt box at top under nav */
  #prompt-box{top:calc(var(--nav-h) + 8px);}
  /* holo screen slightly narrower */
  #holo-screen{width:92vw;}
}
</style>

<script>
(function(){
'use strict';

/* detect mobile once */
var IS_MOBILE = window.innerWidth < 768 ||
  /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

/* ── wait for libs ── */
var wa = 0;
function waitFor(cb){
  if(window.THREE && window.THREE.GLTFLoader && window.gsap && window.ScrollTrigger){ cb(); return; }
  if(++wa > 200){ return; }
  setTimeout(function(){ waitFor(cb); }, 80);
}
waitFor(main);

function main(){
  gsap.registerPlugin(ScrollTrigger);

  var THREE = window.THREE;
  var PI = Math.PI, HPI = PI/2;

  /* ══════════════════════════════════════
     RENDERER — lower pixel ratio on mobile
  ══════════════════════════════════════ */
  var cv = document.getElementById('webgl-canvas');
  var renderer = new THREE.WebGLRenderer({
    canvas: cv,
    alpha: true,
    antialias: !IS_MOBILE,        /* no antialias on mobile = faster */
    powerPreference: 'high-performance'
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, IS_MOBILE ? 1.5 : 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.setClearColor(0x000000, 0);

  /* ══════════════════════════════════════
     SCENE + FOG
  ══════════════════════════════════════ */
  var scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x020814, IS_MOBILE ? 0.008 : 0.012);

  /* ══════════════════════════════════════
     CAMERA — zoomed out to show model + prompt
  ══════════════════════════════════════ */
  var CAM_Z_START = IS_MOBILE ? 26 : 20;
  var camera = new THREE.PerspectiveCamera(
    IS_MOBILE ? 46 : 40,
    window.innerWidth / window.innerHeight,
    0.1, 300
  );
  camera.position.set(0, 1.5, CAM_Z_START);
  camera.lookAt(0, 0, 0);
  var lookY = 0;

  /* ══════════════════════════════════════
     LIGHTS — fewer on mobile
  ══════════════════════════════════════ */
  scene.add(new THREE.AmbientLight(0x040a22, 3));

  /* key — baby blue top */
  var kL = new THREE.SpotLight(0xaaddff, IS_MOBILE ? 10 : 14);
  kL.position.set(0, 10, 6);
  kL.angle = PI/5; kL.penumbra = 0.55; kL.decay = 1.8;
  scene.add(kL); scene.add(kL.target);

  /* rim — purple */
  var rL = new THREE.PointLight(0x7c3aed, IS_MOBILE ? 5 : 8, 28);
  rL.position.set(-6, 4, -6);
  scene.add(rL);

  /* fill — orange */
  var fL = new THREE.PointLight(0xff6622, IS_MOBILE ? 3 : 5, 22);
  fL.position.set(7, -2, 4);
  scene.add(fL);

  /* top blue (desktop only) */
  if(!IS_MOBILE){
    var tL = new THREE.PointLight(0x0088ff, 6, 20);
    tL.position.set(0, 12, 0);
    scene.add(tL);
  }

  /* ══════════════════════════════════════
     STARS — fewer on mobile
  ══════════════════════════════════════ */
  (function(){
    var n = IS_MOBILE ? 400 : 1000;
    var g = new THREE.BufferGeometry();
    var p = new Float32Array(n*3), c = new Float32Array(n*3);
    for(var i=0; i<n; i++){
      var r=80+Math.random()*100, t=Math.random()*PI*2, q=Math.acos(2*Math.random()-1);
      p[i*3]=r*Math.sin(q)*Math.cos(t); p[i*3+1]=r*Math.sin(q)*Math.sin(t); p[i*3+2]=r*Math.cos(q);
      var cl = new THREE.Color().setHSL(0.62+Math.random()*0.28, 0.7, 0.74);
      c[i*3]=cl.r; c[i*3+1]=cl.g; c[i*3+2]=cl.b;
    }
    g.setAttribute('position', new THREE.BufferAttribute(p,3));
    g.setAttribute('color',    new THREE.BufferAttribute(c,3));
    scene.add(new THREE.Points(g, new THREE.PointsMaterial({
      size:0.055, vertexColors:true, transparent:true, opacity:0.78, sizeAttenuation:true
    })));
  })();

  /* ══════════════════════════════════════
     GRADIENT TEXTURE — revealed after spin
  ══════════════════════════════════════ */
  var gradMat = (function(){
    var gC = document.createElement('canvas'); gC.width = gC.height = 512;
    var gx = gC.getContext('2d');
    var grd = gx.createLinearGradient(0,0,512,512);
    grd.addColorStop(0,   '#1a0a4a');
    grd.addColorStop(0.18,'#4f46e5');
    grd.addColorStop(0.38,'#a855f7');
    grd.addColorStop(0.58,'#22d3ee');
    grd.addColorStop(0.78,'#ec4899');
    grd.addColorStop(1,   '#f97316');
    gx.fillStyle = grd; gx.fillRect(0,0,512,512);
    /* shimmer lines */
    gx.strokeStyle = 'rgba(255,255,255,0.02)'; gx.lineWidth = 1;
    for(var li=0; li<512; li+=10){ gx.beginPath(); gx.moveTo(0,li); gx.lineTo(512,li); gx.stroke(); }
    return new THREE.MeshStandardMaterial({
      map: new THREE.CanvasTexture(gC),
      metalness:0.45, roughness:0.08,
      emissive: new THREE.Color(0x2a1560), emissiveIntensity:0.7
    });
  })();

  /* ══════════════════════════════════════
     CONTROLLER GROUP + BEAM
  ══════════════════════════════════════ */
  var ctrlGrp = new THREE.Group();
  ctrlGrp.position.set(0, -1, 0);
  scene.add(ctrlGrp);

  var whiteParts   = [];
  var lightBarMats = [];

  /* ══════════════════════════════════════
     PROJECTOR LIGHT SYSTEM
     — 4 layers: outer cone, mid cone, core,
       floor reflection, side rays
     — matches the image: wide fan of rays
  ══════════════════════════════════════ */

  /* Layer 1 — outermost wide cone, very faint */
  var beamMat = new THREE.MeshBasicMaterial({
    color:0x0044cc, transparent:true, opacity:0,
    side:THREE.DoubleSide, blending:THREE.AdditiveBlending, depthWrite:false
  });
  var beamMesh = new THREE.Mesh(
    new THREE.CylinderGeometry(3.8, 0.05, 9, IS_MOBILE ? 24 : 40, 1, true),
    beamMat
  );
  beamMesh.position.set(0, 4.6, 0);
  scene.add(beamMesh);

  /* Layer 2 — mid cone, medium */
  var bcMat = new THREE.MeshBasicMaterial({
    color:0x0099ff, transparent:true, opacity:0,
    blending:THREE.AdditiveBlending, depthWrite:false
  });
  var bcMesh = new THREE.Mesh(
    new THREE.CylinderGeometry(2.2, 0.04, 9, IS_MOBILE ? 18 : 32, 1, true),
    bcMat
  );
  bcMesh.position.set(0, 4.6, 0);
  scene.add(bcMesh);

  /* Layer 3 — inner bright core cone */
  var coreMat = new THREE.MeshBasicMaterial({
    color:0x44ddff, transparent:true, opacity:0,
    blending:THREE.AdditiveBlending, depthWrite:false
  });
  var coreMesh = new THREE.Mesh(
    new THREE.CylinderGeometry(0.55, 0.02, 9, IS_MOBILE ? 12 : 20, 1, true),
    coreMat
  );
  coreMesh.position.set(0, 4.6, 0);
  scene.add(coreMesh);

  /* Layer 4 — hottest spine (very thin, white-blue) */
  var spineMat = new THREE.MeshBasicMaterial({
    color:0xaaeeff, transparent:true, opacity:0,
    blending:THREE.AdditiveBlending, depthWrite:false
  });
  var spineMesh = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.01, 9, 8, 1, true),
    spineMat
  );
  spineMesh.position.set(0, 4.6, 0);
  scene.add(spineMesh);

  /* Side diagonal rays — like in the image (4 rays splaying outward) */
  var rayMats = [], rayMeshes = [];
  var rayAngles = IS_MOBILE ? [] : [-0.38, 0.38, -0.18, 0.18];
  rayAngles.forEach(function(angle){
    var rm = new THREE.MeshBasicMaterial({
      color:0x0077cc, transparent:true, opacity:0,
      blending:THREE.AdditiveBlending, depthWrite:false
    });
    var rMesh = new THREE.Mesh(
      new THREE.CylinderGeometry(0.04, 0.01, 9, 6, 1, true),
      rm
    );
    rMesh.position.set(0, 4.6, 0);
    rMesh.rotation.z = angle;   /* fan the rays outward */
    scene.add(rMesh);
    rayMats.push(rm);
    rayMeshes.push(rMesh);
  });

  /* Floor pool light — the glow on the surface below the controller */
  var floorPoolMat = new THREE.MeshBasicMaterial({
    color:0x0055aa, transparent:true, opacity:0,
    blending:THREE.AdditiveBlending, depthWrite:false
  });
  var floorPool = new THREE.Mesh(
    new THREE.CircleGeometry(4.5, IS_MOBILE ? 20 : 40),
    floorPoolMat
  );
  floorPool.rotation.x = -Math.PI/2;
  floorPool.position.set(0, -2.8, 0);
  scene.add(floorPool);

  /* Dynamic light — illuminates the controller from the beam */
  var beamLight = new THREE.PointLight(0x0088ff, 0, 18);
  beamLight.position.set(0, 3.5, 0);
  scene.add(beamLight);

  /* Emitter on top of model — bright glow dot */
  var emMat = new THREE.MeshBasicMaterial({
    color:0x00eeff, transparent:true, opacity:0, blending:THREE.AdditiveBlending
  });
  var emMesh = new THREE.Mesh(new THREE.SphereGeometry(0.18, IS_MOBILE ? 10 : 16, IS_MOBILE ? 10 : 16), emMat);
  emMesh.position.set(0, 2.4, 0);
  scene.add(emMesh);

  /* Emitter halo ring */
  var emRingMat = new THREE.MeshBasicMaterial({
    color:0x00ccff, transparent:true, opacity:0, blending:THREE.AdditiveBlending
  });
  var emRing = new THREE.Mesh(
    new THREE.TorusGeometry(0.35, 0.04, 8, IS_MOBILE ? 18 : 30),
    emRingMat
  );
  emRing.rotation.x = Math.PI/2;
  emRing.position.set(0, 2.4, 0);
  scene.add(emRing);

  /* holo particles — fewer on mobile */
  var hPN = IS_MOBILE ? 35 : 75;
  var hpG = new THREE.BufferGeometry();
  var hpP = new Float32Array(hPN*3), hpV = new Float32Array(hPN*3);
  for(var hpi=0; hpi<hPN; hpi++){
    hpP[hpi*3]   = (Math.random()-0.5)*8;
    hpP[hpi*3+1] = 6 + Math.random()*4;
    hpP[hpi*3+2] = (Math.random()-0.5)*1.5;
    hpV[hpi*3]   = (Math.random()-0.5)*0.006;
    hpV[hpi*3+1] = 0.002 + Math.random()*0.004;
    hpV[hpi*3+2] = (Math.random()-0.5)*0.004;
  }
  hpG.setAttribute('position', new THREE.BufferAttribute(hpP,3));
  var hpM = new THREE.Points(hpG, new THREE.PointsMaterial({
    size:0.055, color:0x00ddff, transparent:true, opacity:0,
    sizeAttenuation:true, blending:THREE.AdditiveBlending
  }));
  scene.add(hpM);

  /* ══════════════════════════════════════
     LOAD REAL .GLB
  ══════════════════════════════════════ */
  var loader = new THREE.GLTFLoader();
  loader.load(
    './ps5_controller.glb',
    function(gltf){
      var model = gltf.scene;

      /* auto scale + centre */
      var bbox = new THREE.Box3().setFromObject(model);
      var sz   = new THREE.Vector3();
      bbox.getSize(sz);
      var targetSize = IS_MOBILE ? 7 : 5.5;
      model.scale.setScalar(targetSize / Math.max(sz.x, sz.y, sz.z));
      bbox.setFromObject(model);
      var ctr = new THREE.Vector3();
      bbox.getCenter(ctr);
      model.position.sub(ctr);

      /* classify + style materials */
      model.traverse(function(child){
        if(!child.isMesh) return;
        var mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(function(mat){
          if(!mat || !mat.color) return;
          var c = mat.color, br = (c.r+c.g+c.b)/3;

          if(c.b > 0.6 && c.r < 0.15){
            /* light bar — neon blue */
            mat.emissive = new THREE.Color(0x0055ff);
            mat.emissiveIntensity = 3.5;
            mat.roughness = 0.04;
            lightBarMats.push(mat);
          } else if(br > 0.35){
            /* white/light-grey → cool blue-white PS5 style */
            mat.color.set(0xeef2ff);
            mat.metalness = 0.18;
            mat.roughness = 0.12;
            child.userData.origMat = mat;
            whiteParts.push(child);
          } else if(br < 0.05){
            /* very dark — subtle blue emissive */
            mat.emissive = new THREE.Color(0x000411);
            mat.emissiveIntensity = 0.8;
          }
        });
      });

      ctrlGrp.add(model);
    },
    null,
    function(err){ console.warn('GLB load error:', err); }
  );

  /* ══════════════════════════════════════
     GSAP SCROLL TIMELINE
  ══════════════════════════════════════ */
  var tl = gsap.timeline({
    scrollTrigger:{
      trigger:'body', start:'top top', end:'bottom bottom',
      scrub: IS_MOBILE ? 1.5 : 2
    }
  });

  /* 0 — hide scroll hint */
  tl.to('#scroll-hint', {opacity:0, duration:.4}, 0);

  /* 0 → 0.8 — prompt box fades in */
  tl.to('#prompt-box', {opacity:1, duration:.8, ease:'power2.out'}, 0);

  /* 0.8 → 3.8 — typing */
  var PROMPT = 'Create a space shooter game with first-person view. Enemies attack in waves. I destroy them with plasma lasers.';
  var typer  = {v:0};
  tl.to(typer, {
    v: PROMPT.length, duration:3, ease:'none',
    onUpdate: function(){
      document.getElementById('typewriter').textContent =
        PROMPT.substring(0, Math.round(typer.v));
    }
  }, 0.8);

  /* 4.0 → 7.0 — SYNCHRONIZED SPIN
     Joystick 360° (2×) + prompt box 180° (1×) */
  tl.to(ctrlGrp.rotation, {y: PI*2, duration:3, ease:'power1.inOut'}, 4.0);
  tl.to('#prompt-box', {
    rotationY:180, opacity:0, scale:.88, duration:3, ease:'power1.inOut'
  }, 4.0);

  /* colour swap at joystick 180° midpoint */
  tl.call(function(){
    whiteParts.forEach(function(m){ m.userData.origMat2=m.material; m.material=gradMat; });
    beamMat.color.set(0x6633ff); bcMat.color.set(0xaa66ff);
  }, null, 5.5);
  tl.call(function(){
    whiteParts.forEach(function(m){ if(m.userData.origMat2) m.material=m.userData.origMat2; });
    beamMat.color.set(0x0066ff); bcMat.color.set(0x44ccff);
  }, null, 5.45);

  /* 7.0 — camera rises to frame joystick + hologram */
  tl.to(camera.position, {y: IS_MOBILE?4:5, duration:2, ease:'power2.inOut'}, 7.0);

  /* 7.2 — hologram appears above joystick */
  tl.to('#holo-wrap', {opacity:1, scale:1,
    top:'38%',   /* sits above centre — above controller */
    duration:2, ease:'back.out(1.2)'}, 7.2);
  tl.to('#holo-floor', {opacity:1, scale:1,
    top:'56%',
    duration:1.6, ease:'power2.out'}, 7.4);
  tl.to('#holo-beam-css', {opacity:1,
    duration:1.4, ease:'power2.out'}, 7.3);
  tl.call(function(){
    document.getElementById('game-vid').play().catch(function(){});
    document.querySelector('.h-sweep').style.opacity='1';
  }, null, 7.2);
  tl.to(beamMat,       {opacity:.14, duration:1.8}, 7.2);
  tl.to(bcMat,         {opacity:.28, duration:1.8}, 7.2);
  tl.to(coreMat,       {opacity:.55, duration:1.6}, 7.2);
  tl.to(spineMat,      {opacity:.85, duration:1.4}, 7.2);
  tl.to(emMat,         {opacity:.95, duration:1.0}, 7.2);
  tl.to(emRingMat,     {opacity:.7,  duration:1.2}, 7.2);
  tl.to(floorPoolMat,  {opacity:.35, duration:2.0}, 7.2);
  tl.to(beamLight,     {intensity:8, duration:1.8}, 7.2);
  tl.to(hpM.material,  {opacity:.5,  duration:1.8}, 7.2);
  /* side rays staggered */
  rayMats.forEach(function(rm, i){
    tl.to(rm, {opacity:.18, duration:1.4}, 7.2 + i*0.1);
  });

  /* 9.5 — gentle upward drift, NO zoom */
  tl.to(camera.position, {y: IS_MOBILE?6.5:7.5, duration:2, ease:'power2.inOut'}, 9.5);

  /* 12.5 — hologram folds back */
  tl.to('#holo-wrap', {opacity:0, scale:0.06, duration:1.8, ease:'power3.in'}, 12.5);
  tl.to('#holo-floor',{opacity:0, duration:1.2}, 12.5);
  tl.to('#holo-beam-css',{opacity:0, duration:1.2}, 12.5);
  tl.call(function(){
    document.getElementById('game-vid').pause();
    document.querySelector('.h-sweep').style.opacity='0';
  }, null, 12.5);
  tl.to(beamMat,     {opacity:0, duration:1.5}, 12.5);
  tl.to(bcMat,       {opacity:0, duration:1.5}, 12.5);
  tl.to(coreMat,     {opacity:0, duration:1.2}, 12.5);
  tl.to(spineMat,    {opacity:0, duration:1.0}, 12.5);
  tl.to(emMat,       {opacity:0, duration:1.0}, 13.0);
  tl.to(emRingMat,   {opacity:0, duration:1.0}, 12.8);
  tl.to(floorPoolMat,{opacity:0, duration:1.5}, 12.5);
  tl.to(beamLight,   {intensity:0, duration:1.5}, 12.5);
  tl.to(hpM.material,{opacity:0, duration:1.5}, 12.5);
  rayMats.forEach(function(rm){
    tl.to(rm, {opacity:0, duration:1.2}, 12.5);
  });

  /* 13.8 — energy flash */
  tl.call(function(){
    lightBarMats.forEach(function(m){ m.emissiveIntensity=18; });
    setTimeout(function(){
      lightBarMats.forEach(function(m){ gsap.to(m,{emissiveIntensity:3.5,duration:1.5}); });
    }, 200);
  }, null, 13.8);

  /* 14 — wide final view */
  tl.to(camera.position, {z: IS_MOBILE?28:24, y:3, duration:2.5, ease:'power2.out'}, 14);
  tl.to(ctrlGrp.rotation, {x:-.04, duration:2, ease:'power2.out'}, 14);

  /* 15.5 — REVEAL hero UI + auth */
  tl.to('#bottom-ui', {opacity:1, y:0, duration:2, ease:'power2.out'}, 15.5);
  tl.call(function(){ document.getElementById('nav-auth').classList.add('show'); }, null, 15.5);

  /* phase labels */
  [[0,'—'],[0.8,'PROMPT'],[4.0,'SPIN'],[7.2,'HOLOGRAM'],[12.5,'ABSORBED'],[15.5,'BUILD']].forEach(function(ph){
    tl.call(function(){ document.getElementById('phase-lbl').textContent=ph[1]+' _'; }, null, ph[0]);
  });

  /* ══════════════════════════════════════
     RENDER LOOP — capped at 60fps
  ══════════════════════════════════════ */
  var T=0, lastRaf=0;
  var FPS_CAP = IS_MOBILE ? 1000/50 : 0; /* ~50fps on mobile */

  function animate(now){
    requestAnimationFrame(animate);
    if(IS_MOBILE && now - lastRaf < FPS_CAP) return;
    lastRaf = now;
    T = now * 0.001;

    /* lights */
    kL.intensity = (IS_MOBILE?9:12) + Math.sin(T*1.65)*2;
    rL.intensity = (IS_MOBILE?4:7)  + Math.sin(T*1.25+1)*1.5;
    fL.intensity = (IS_MOBILE?2:4)  + Math.sin(T*2.1)*.8;

    /* controller float */
    ctrlGrp.position.y = -1 + Math.sin(T*0.72)*0.18;

    /* beam animation */
    if(spineMat.opacity > 0){
      /* outer cones rotate slowly — creates the fan-ray shimmer */
      beamMesh.rotation.y =  T * 0.22;
      bcMesh.rotation.y   = -T * 0.35;
      coreMesh.rotation.y =  T * 0.5;
      /* side rays wave gently */
      rayMeshes.forEach(function(rm, i){
        rm.rotation.z = rayAngles[i] + Math.sin(T*1.4 + i) * 0.04;
      });
      /* emitter pulse */
      var ep = 0.75 + Math.sin(T*9)*0.2;
      emMesh.material.opacity  = ep;
      emRingMat.opacity        = ep * 0.75;
      emRing.rotation.z        = T * 2.2;
      /* dynamic light pulse */
      beamLight.intensity = 7 + Math.sin(T*2.8)*2;
      /* floor pool breathe */
      floorPoolMat.opacity = 0.25 + Math.sin(T*1.2)*0.1;
    }

    /* holo particles */
    if(hpM.material.opacity > 0){
      var ha = hpG.attributes.position.array;
      for(var pi=0; pi<hPN; pi++){
        ha[pi*3]   += hpV[pi*3] + Math.sin(T+pi)*0.002;
        ha[pi*3+1] += hpV[pi*3+1];
        ha[pi*3+2] += hpV[pi*3+2];
        if(ha[pi*3+1] > 10.5) ha[pi*3+1] = 6;
        if(Math.abs(ha[pi*3]) > 5) hpV[pi*3] *= -1;
      }
      hpG.attributes.position.needsUpdate = true;
    }

    /* smooth lookAt */
    var tgtY = beamMat.opacity > 0.05 ? 5 : 0;
    lookY += (tgtY-lookY)*0.022;
    camera.lookAt(Math.sin(T*0.06)*0.14, lookY, 0);

    /* light bar breathe */
    if(beamMat.opacity < 0.05){
      lightBarMats.forEach(function(m){
        m.emissiveIntensity = 2.8 + Math.sin(T*1.85)*0.55;
      });
    }

    renderer.render(scene, camera);
  }
  requestAnimationFrame(animate);

  /* ── dismiss loader ── */
  setTimeout(function(){
    var ld = document.getElementById('loader');
    ld.classList.add('out');
    setTimeout(function(){ ld.style.display='none'; }, 1000);
  }, 2200);

  /* ── resize ── */
  window.addEventListener('resize', function(){
    IS_MOBILE = window.innerWidth < 768;
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, IS_MOBILE ? 1.5 : 2));
  });

  document.getElementById('webgl-canvas').addEventListener('contextmenu', function(e){ e.preventDefault(); });
}

})();
</script>
</body>
</html>
